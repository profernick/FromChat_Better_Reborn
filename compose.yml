services:
  backend:
    build:
      context: .
      dockerfile: src/Dockerfile
      target: main
    env_file:
      - .env
    environment:
      PORT: 8300
      MESSAGING_SERVICE_URL: http://messaging:8301
      FILE_STORAGE_SERVICE_URL: http://file_storage:8302
      CHAT_FILTER_URL: http://chat_filter:8305
      DATABASE_URL: postgresql://main_user:${MAIN_DB_PASSWORD}@postgres:5432/fromchat_main
      MAIN_DB_PASSWORD: ${MAIN_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      COMPLIANCE_PUBLIC_KEY: ${COMPLIANCE_PUBLIC_KEY}
      MESSAGE_RETENTION_DAYS: ${MESSAGE_RETENTION_DAYS}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-fromchat_dev}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-local_dev_secret_must_be_at_least_32_characters_long}
    ports:
      - "8300:8300"
    volumes:
      - ./data/prod:/app/data
      - ./data/prod/files:/app/files
      - ./firebase-cert.json:/app/firebase-cert.json:ro
    networks:
      - public
      - services
    # No depends_on: Compose watch recreates deps and can leave them stuck in Created
    # (docker/compose#13717). Backend retries DB; other services tolerate brief unavailability.
    healthcheck:
      test: ["CMD", "python3", "/usr/local/bin/healthcheck.py"]
      interval: 3s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    develop:
      watch:
        - action: sync+restart
          path: ./src/main
          target: /app/src/main
        - action: sync+restart
          path: ./src/shared
          target: /app/src/shared
        - action: sync+restart
          path: ./alembic
          target: /app/alembic
        - action: sync+restart
          path: ./alembic.ini
          target: /app/alembic.ini
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./src/Dockerfile
        - action: rebuild
          path: ./utils

  messaging:
    build:
      context: .
      dockerfile: src/Dockerfile
      target: messaging
    env_file:
      - .env
    environment:
      PORT: 8301
      COMPLIANCE_PUBLIC_KEY: ${COMPLIANCE_PUBLIC_KEY}
      MESSAGE_RETENTION_DAYS: ${MESSAGE_RETENTION_DAYS}
    volumes:
      - ./data/prod/logs/messaging:/app/logs
    networks:
      - services
    healthcheck:
      test: ["CMD", "python3", "/usr/local/bin/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./src/messaging
          target: /app/src/messaging
        - action: sync+restart
          path: ./src/shared
          target: /app/src/shared
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./src/Dockerfile
        - action: rebuild
          path: ./utils

  file_storage:
    build:
      context: .
      dockerfile: src/Dockerfile
      target: file_storage
    env_file:
      - .env
    environment:
      PORT: 8302
      FILES_DIR: /app/files
    volumes:
      - ./data/prod/files:/app/files
      - ./data/prod/logs/file_storage:/app/logs
    networks:
      - services
    healthcheck:
      test: ["CMD", "python3", "/usr/local/bin/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./src/file_storage
          target: /app/src/file_storage
        - action: sync+restart
          path: ./src/shared
          target: /app/src/shared
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./src/Dockerfile
        - action: rebuild
          path: ./utils

  chat_filter:
    build:
      context: .
      dockerfile: src/Dockerfile
      target: chat_filter
    environment:
      PORT: 8305
      DATA_DIR: /data
    volumes:
      - ./data/prod/chat_filter:/data
      # One-time migrate: old main DATA_DIR/profanity/blocklist.json → /data/blocklist.json
      - ./data/prod/profanity:/legacy/profanity:ro
    networks:
      - services
    healthcheck:
      test: ["CMD", "python3", "/usr/local/bin/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./src/chat_filter
          target: /app/src/chat_filter
        - action: sync+restart
          path: ./src/shared
          target: /app/src/shared
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./src/Dockerfile
        - action: rebuild
          path: ./utils

  livekit:
    build:
      context: ./src/livekit
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-fromchat_dev}: ${LIVEKIT_API_SECRET:-local_dev_secret_must_be_at_least_32_characters_long}"
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    ports:
      - "8303:8303"
      - "8304:8304"
      - "50000-50100:50000-50100/udp"
    networks:
      - public

  postgres:
    build:
      context: ./src/postgres
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_DB: fromchat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MAIN_DB_PASSWORD: ${MAIN_DB_PASSWORD}
      MESSAGING_DB_PASSWORD: ${MESSAGING_DB_PASSWORD}
      FILE_STORAGE_DB_PASSWORD: ${FILE_STORAGE_DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - services
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 10s
      retries: 15
    restart: unless-stopped

networks:
  public:
    driver: bridge
    internal: false
  services:
    driver: bridge
    internal: true

