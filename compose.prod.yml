services:
  caddy:
    build:
      context: ./src/caddy
      dockerfile: Dockerfile
    # Loopback only — HAProxy (host network) forwards 80/443 here with PROXY protocol.
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8443:8443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/prod/caddy/data:/data
      - ./data/prod/caddy/config:/config
    networks:
      - public
    restart: unless-stopped

  haproxy:
    build:
      context: ./src/haproxy
      dockerfile: Dockerfile
    # Host network so UFW can filter 80/443 (Docker-published ports bypass UFW).
    network_mode: host
    user: "0:0"
    depends_on:
      - caddy
    restart: unless-stopped
