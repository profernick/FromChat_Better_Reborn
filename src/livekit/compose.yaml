# LiveKit SFU for docker compose (local / prod stack).
# Keys must match LIVEKIT_API_KEY / LIVEKIT_API_SECRET in .env — see local.env.example
port: 8303

rtc:
  tcp_port: 8304
  # Narrow range for docker compose — enough for local 1:1 calls; avoids binding 10k host UDP ports.
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: false

keys:
  fromchat_dev: "local_dev_secret_must_be_at_least_32_characters_long"
